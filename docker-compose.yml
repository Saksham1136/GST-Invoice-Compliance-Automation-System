version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gst_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gst-compliance
    networks:
      - gst_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gst_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/gst-compliance
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-jwt-secret-64-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-64-chars}
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - gst_network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: gst_ai_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV: production
      BACKEND_URL: http://backend:5000
      WORKERS: 2
    volumes:
      - ./ai-service/logs:/app/logs
    networks:
      - gst_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: gst_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gst_network

volumes:
  mongo_data:

networks:
  gst_network:
    driver: bridge
