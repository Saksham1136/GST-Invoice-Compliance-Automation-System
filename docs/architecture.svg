<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" style="font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a;">
  <!-- Background -->
  <rect width="900" height="580" fill="#0f172a" rx="16"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700" letter-spacing="0.5">GST Compliance Automation — Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="11">Microservice Architecture · React · Node.js · FastAPI · MongoDB</text>
  
  <!-- ======= USER ======= -->
  <g transform="translate(370, 80)">
    <rect width="160" height="50" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="18" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600" letter-spacing="1">USER</text>
    <text x="80" y="34" text-anchor="middle" fill="#dbeafe" font-size="12" font-weight="700">Browser / Mobile</text>
    <text x="80" y="46" text-anchor="middle" fill="#93c5fd" font-size="9">HTTPS · REST · JSON</text>
  </g>
  
  <!-- Arrow User → Frontend -->
  <line x1="450" y1="130" x2="450" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,153 450,162 455,153" fill="#3b82f6"/>
  
  <!-- ======= FRONTEND ======= -->
  <g transform="translate(305, 162)">
    <rect width="290" height="75" rx="12" fill="#0d2137" stroke="#0ea5e9" stroke-width="2"/>
    <rect width="290" height="24" rx="12" fill="#0c4a6e" rx="4"/>
    <text x="145" y="16" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="700" letter-spacing="1.5">FRONTEND · PORT 3000</text>
    <text x="145" y="38" text-anchor="middle" fill="#bae6fd" font-size="13" font-weight="700">React.js 18 + Tailwind CSS</text>
    <text x="48" y="55" text-anchor="middle" fill="#7dd3fc" font-size="9">Dashboard</text>
    <text x="110" y="55" text-anchor="middle" fill="#7dd3fc" font-size="9">Upload</text>
    <text x="165" y="55" text-anchor="middle" fill="#7dd3fc" font-size="9">Invoices</text>
    <text x="225" y="55" text-anchor="middle" fill="#7dd3fc" font-size="9">Analytics</text>
    <text x="145" y="68" text-anchor="middle" fill="#475569" font-size="8">Recharts · React Router · Axios · react-dropzone</text>
  </g>
  
  <!-- Arrow Frontend → Backend -->
  <line x1="450" y1="237" x2="450" y2="270" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="445,268 450,278 455,268" fill="#14b8a6"/>
  <text x="465" y="258" fill="#14b8a6" font-size="9">REST API</text>
  
  <!-- ======= BACKEND ======= -->
  <g transform="translate(200, 278)">
    <rect width="500" height="100" rx="12" fill="#0d2118" stroke="#10b981" stroke-width="2"/>
    <rect width="500" height="24" rx="12" fill="#064e3b" rx="4"/>
    <text x="250" y="16" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700" letter-spacing="1.5">BACKEND API GATEWAY · PORT 5000</text>
    <text x="250" y="40" text-anchor="middle" fill="#a7f3d0" font-size="13" font-weight="700">Node.js 20 + Express 4</text>
    
    <!-- Modules -->
    <g transform="translate(10, 48)">
      <rect width="90" height="38" rx="6" fill="#052e16" stroke="#065f46" stroke-width="1"/>
      <text x="45" y="15" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Auth & JWT</text>
      <text x="45" y="27" text-anchor="middle" fill="#4ade80" font-size="8">Login/Signup</text>
      <text x="45" y="37" text-anchor="middle" fill="#4ade80" font-size="8">Refresh Tokens</text>
    </g>
    <g transform="translate(110, 48)">
      <rect width="90" height="38" rx="6" fill="#052e16" stroke="#065f46" stroke-width="1"/>
      <text x="45" y="15" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Invoice API</text>
      <text x="45" y="27" text-anchor="middle" fill="#4ade80" font-size="8">Upload/Bulk</text>
      <text x="45" y="37" text-anchor="middle" fill="#4ade80" font-size="8">CRUD · Export</text>
    </g>
    <g transform="translate(210, 48)">
      <rect width="90" height="38" rx="6" fill="#052e16" stroke="#065f46" stroke-width="1"/>
      <text x="45" y="15" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">GST Validator</text>
      <text x="45" y="27" text-anchor="middle" fill="#4ade80" font-size="8">GSTIN Checksum</text>
      <text x="45" y="37" text-anchor="middle" fill="#4ade80" font-size="8">Tax Rules</text>
    </g>
    <g transform="translate(310, 48)">
      <rect width="90" height="38" rx="6" fill="#052e16" stroke="#065f46" stroke-width="1"/>
      <text x="45" y="15" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Dashboard</text>
      <text x="45" y="27" text-anchor="middle" fill="#4ade80" font-size="8">Aggregation</text>
      <text x="45" y="37" text-anchor="middle" fill="#4ade80" font-size="8">Analytics</text>
    </g>
    <g transform="translate(410, 48)">
      <rect width="80" height="38" rx="6" fill="#052e16" stroke="#065f46" stroke-width="1"/>
      <text x="40" y="15" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">Security</text>
      <text x="40" y="27" text-anchor="middle" fill="#4ade80" font-size="8">Helmet·CORS</text>
      <text x="40" y="37" text-anchor="middle" fill="#4ade80" font-size="8">Rate Limiting</text>
    </g>
  </g>
  
  <!-- Arrows Backend → MongoDB and AI Service -->
  <line x1="310" y1="378" x2="215" y2="430" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="213,423 210,432 219,429" fill="#f59e0b"/>
  
  <line x1="590" y1="378" x2="685" y2="430" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="680,423 685,432 691,426" fill="#a78bfa"/>
  
  <!-- ======= MONGODB ======= -->
  <g transform="translate(100, 430)">
    <rect width="210" height="110" rx="12" fill="#1c140a" stroke="#f59e0b" stroke-width="2"/>
    <rect width="210" height="24" rx="12" fill="#451a03" rx="4"/>
