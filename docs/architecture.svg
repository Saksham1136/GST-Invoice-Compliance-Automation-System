    <text x="105" y="40" text-anchor="middle" fill="#fef3c7" font-size="13" font-weight="700">MongoDB 7.0</text>
    <text x="105" y="56" text-anchor="middle" fill="#fcd34d" font-size="9">Collections</text>
    <g transform="translate(15, 62)">
      <rect width="55" height="34" rx="5" fill="#292105" stroke="#78350f" stroke-width="1"/>
      <text x="27" y="14" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">users</text>
      <text x="27" y="27" text-anchor="middle" fill="#d97706" font-size="8">Auth · Roles</text>
    </g>
    <g transform="translate(80, 62)">
      <rect width="60" height="34" rx="5" fill="#292105" stroke="#78350f" stroke-width="1"/>
      <text x="30" y="14" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">invoices</text>
      <text x="30" y="27" text-anchor="middle" fill="#d97706" font-size="8">Files · Data</text>
    </g>
    <g transform="translate(150, 62)">
      <rect width="50" height="34" rx="5" fill="#292105" stroke="#78350f" stroke-width="1"/>
      <text x="25" y="14" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">indexes</text>
      <text x="25" y="27" text-anchor="middle" fill="#d97706" font-size="8">Performance</text>
    </g>
  </g>
  
  <!-- ======= AI SERVICE ======= -->
  <g transform="translate(590, 430)">
    <rect width="210" height="110" rx="12" fill="#130d24" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="210" height="24" rx="12" fill="#2e1065" rx="4"/>
    <text x="105" y="16" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="700" letter-spacing="1.5">AI SERVICE · PORT 8000</text>
    <text x="105" y="40" text-anchor="middle" fill="#ede9fe" font-size="13" font-weight="700">Python FastAPI</text>
    <g transform="translate(10, 48)">
      <rect width="88" height="52" rx="6" fill="#1e0a47" stroke="#4c1d95" stroke-width="1"/>
      <text x="44" y="16" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">OCR Engine</text>
      <text x="44" y="29" text-anchor="middle" fill="#8b5cf6" font-size="8">Tesseract OCR</text>
      <text x="44" y="40" text-anchor="middle" fill="#8b5cf6" font-size="8">OpenCV Preprocess</text>
      <text x="44" y="51" text-anchor="middle" fill="#8b5cf6" font-size="8">PDF → Image</text>
    </g>
    <g transform="translate(108, 48)">
      <rect width="92" height="52" rx="6" fill="#1e0a47" stroke="#4c1d95" stroke-width="1"/>
      <text x="46" y="16" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Field Extractor</text>
      <text x="46" y="29" text-anchor="middle" fill="#8b5cf6" font-size="8">GSTIN Regex</text>
      <text x="46" y="40" text-anchor="middle" fill="#8b5cf6" font-size="8">Amount Parser</text>
      <text x="46" y="51" text-anchor="middle" fill="#8b5cf6" font-size="8">Date Patterns</text>
    </g>
  </g>
  
  <!-- File Storage label -->
  <g transform="translate(350, 430)">
    <rect width="190" height="60" rx="10" fill="#0f1e2e" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="95" y="22" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="1">FILE STORAGE</text>
    <text x="95" y="38" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">uploads/ (Local / S3)</text>
    <text x="95" y="52" text-anchor="middle" fill="#475569" font-size="8">PDF · JPEG · PNG · TIFF · WEBP</text>
  </g>
  
  <!-- Arrow Backend → File Storage -->
  <line x1="450" y1="378" x2="445" y2="428" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="440,426 445,435 450,426" fill="#475569"/>
  
  <!-- Legend -->
  <g transform="translate(20, 540)">
    <rect width="8" height="8" rx="2" fill="#0ea5e9"/>
    <text x="14" y="8" fill="#64748b" font-size="9">Frontend</text>
    <rect x="80" width="8" height="8" rx="2" fill="#10b981"/>
    <text x="94" y="8" fill="#64748b" font-size="9">Backend</text>
    <rect x="160" width="8" height="8" rx="2" fill="#8b5cf6"/>
    <text x="174" y="8" fill="#64748b" font-size="9">AI Service</text>
    <rect x="250" width="8" height="8" rx="2" fill="#f59e0b"/>
    <text x="264" y="8" fill="#64748b" font-size="9">Database</text>
    <text x="600" y="8" fill="#475569" font-size="9">GST Compliance Automation · Full-Stack Assessment Project</text>
  </g>
</svg>
